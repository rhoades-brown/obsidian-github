name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # ------------------------------------------------------------------
  # Build & test — runs on every push and PR
  # ------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test

  # ------------------------------------------------------------------
  # Release — only on push to main/master, after build passes.
  # Analyses conventional commits since the last tag, bumps the
  # version, commits the change, and creates a GitHub release.
  # ------------------------------------------------------------------
  release:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if version-bump commit
        id: skip
        run: |
          MSG=$(git log -1 --pretty=format:"%s")
          if echo "$MSG" | grep -q "\[skip ci\]"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping release — version-bump commit detected."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Determine version bump from conventional commits
        if: steps.skip.outputs.skip == 'false'
        id: bump
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LATEST_TAG}..HEAD"
          fi

          COMMITS=$(git log $RANGE --pretty=format:"%s" --no-merges)
          echo "Commits since ${LATEST_TAG:-beginning}:"
          echo "$COMMITS"

          BUMP="none"
          if echo "$COMMITS" | grep -qiE "(BREAKING[ -]CHANGE|^[a-z]+(\(.+\))?!:)"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?!?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^fix(\(.+\))?!?:"; then
            BUMP="patch"
          fi

          echo "bump=$BUMP" >> $GITHUB_OUTPUT
          echo "Determined bump type: $BUMP"

      - name: Setup Node.js
        if: steps.skip.outputs.skip == 'false' && steps.bump.outputs.bump != 'none'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.skip.outputs.skip == 'false' && steps.bump.outputs.bump != 'none'
        run: npm ci

      - name: Bump version
        if: steps.skip.outputs.skip == 'false' && steps.bump.outputs.bump != 'none'
        id: version
        run: |
          node version-bump.mjs --bump=${{ steps.bump.outputs.bump }}
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "New version: $VERSION"

      - name: Rebuild with new version
        if: steps.skip.outputs.skip == 'false' && steps.bump.outputs.bump != 'none'
        run: npm run build

      - name: Commit and push version bump
        if: steps.skip.outputs.skip == 'false' && steps.bump.outputs.bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json package.json versions.json package-lock.json
          git commit -m "chore: release ${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Create release
        if: steps.skip.outputs.skip == 'false' && steps.bump.outputs.bump != 'none'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: |
            main.js
            manifest.json
            styles.css
          generate_release_notes: true
          draft: false
          prerelease: false
